<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f4ed">
  <title>과제 마감 플래너</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="#" aria-label="과제 마감 플래너 홈">
        <span class="brand-mark">D</span>
        <span>
          <strong>Deadline</strong>
          <small>과제 마감 플래너</small>
        </span>
      </a>
      <div class="today-chip" id="todayLabel"></div>
    </header>

    <main>
      <section class="hero">
        <div>
          <p class="eyebrow">MY STUDY SCHEDULE</p>
          <h1>마감은 가볍게,<br><em>준비는 미리.</em></h1>
          <p class="hero-copy">수행평가와 과제를 한눈에 정리하고<br>중요한 마감일을 놓치지 마세요.</p>
        </div>
        <div class="hero-stats" aria-label="일정 요약">
          <div>
            <strong id="activeCount">0</strong>
            <span>진행 중</span>
          </div>
          <div>
            <strong id="urgentCount">0</strong>
            <span>마감 임박</span>
          </div>
          <div>
            <strong id="doneCount">0</strong>
            <span>완료</span>
          </div>
        </div>
      </section>

      <section class="urgent-panel" id="urgentPanel" aria-labelledby="urgentTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow danger">DEADLINE ALERT</p>
            <h2 id="urgentTitle">곧 마감되는 일정</h2>
          </div>
          <span class="alert-badge" id="urgentBadge">0건</span>
        </div>
        <div class="urgent-list" id="urgentList"></div>
      </section>

      <section class="workspace">
        <aside class="task-form-card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">NEW SCHEDULE</p>
              <h2>일정 입력</h2>
            </div>
            <span class="plus-mark">+</span>
          </div>

          <form id="taskForm">
            <input type="hidden" id="editingTaskId">
            <label>
              <span>과목명</span>
              <input id="subjectInput" type="text" maxlength="20" placeholder="예: 국어" required>
            </label>
            <label>
              <span>과제명</span>
              <input id="titleInput" type="text" maxlength="60" placeholder="예: 독서 감상문 제출" required>
            </label>
            <label>
              <span>마감일</span>
              <input id="dateInput" type="date" required>
            </label>
            <label>
              <span>상세 내용</span>
              <textarea id="detailInput" rows="4" maxlength="500" placeholder="준비물, 제출 방법 등을 적어보세요."></textarea>
            </label>
            <div class="form-actions">
              <button class="primary-button" id="submitButton" type="submit">일정 추가하기</button>
              <button class="text-button hidden" id="cancelEditButton" type="button">수정 취소</button>
            </div>
          </form>
        </aside>

        <section class="calendar-card" aria-labelledby="calendarTitle">
          <div class="calendar-toolbar">
            <div>
              <p class="eyebrow">MONTHLY VIEW</p>
              <h2 id="calendarTitle"></h2>
            </div>
            <div class="calendar-controls">
              <button id="prevMonthButton" type="button" aria-label="이전 달">←</button>
              <button class="today-button" id="todayButton" type="button">오늘</button>
              <button id="nextMonthButton" type="button" aria-label="다음 달">→</button>
            </div>
          </div>
          <div class="weekdays" aria-hidden="true">
            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </section>
      </section>

      <section class="task-board">
        <div class="list-card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">TO DO</p>
              <h2>진행 중인 과제</h2>
            </div>
            <span class="count-badge" id="activeListCount">0</span>
          </div>
          <div class="task-list" id="activeTaskList"></div>
        </div>

        <div class="list-card completed-card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">ARCHIVE</p>
              <h2>완료함</h2>
            </div>
            <button class="text-button" id="clearDoneButton" type="button">완료 기록 비우기</button>
          </div>
          <div class="task-list" id="completedTaskList"></div>
        </div>
      </section>
    </main>

    <footer>오늘의 작은 정리가 내일의 여유를 만듭니다.</footer>
  </div>

  <div class="modal-backdrop hidden" id="dayModal">
    <section class="day-modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="closeModalButton" type="button" aria-label="닫기">×</button>
      <p class="eyebrow">DAY DETAIL</p>
      <h2 id="modalTitle"></h2>
      <div class="modal-task-list" id="modalTaskList"></div>
      <label class="memo-label" for="dayMemo">
        <span>이날의 메모</span>
        <textarea id="dayMemo" rows="5" maxlength="1000" placeholder="준비할 것, 공부 계획, 기억할 내용을 자유롭게 적어보세요."></textarea>
      </label>
      <button class="primary-button" id="saveMemoButton" type="button">메모 저장</button>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
